<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whipship — Fulfillment OS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --void: #080808;
    --carbon: #111111;
    --carbon2: #181818;
    --carbon3: #202020;
    --carbon4: #282828;
    --red: #E8002D;
    --red-glow: rgba(232,0,45,0.12);
    --red-dim: rgba(232,0,45,0.08);
    --red-mid: rgba(232,0,45,0.2);
    --green: #00D166;
    --green-dim: rgba(0,209,102,0.1);
    --amber: #F59E0B;
    --amber-dim: rgba(245,158,11,0.1);
    --blue: #3B8BEB;
    --blue-dim: rgba(59,139,235,0.1);
    --chalk: #F2EEE8;
    --chalk-80: rgba(242,238,232,0.8);
    --chalk-40: rgba(242,238,232,0.4);
    --chalk-20: rgba(242,238,232,0.2);
    --chalk-10: rgba(242,238,232,0.1);
    --chalk-05: rgba(242,238,232,0.05);
    --ash: #5A5A5A;
    --ash2: #3A3A3A;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --border3: rgba(255,255,255,0.15);
    --sidebar-w: 230px;
  }

  html, body {
    height: 100%;
    background: var(--void);
    color: var(--chalk);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* ─── SIDEBAR ─────────────────────────────────────────────────────────────── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--carbon);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 10;
  }

  #sidebar::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(to bottom, transparent, var(--red) 30%, var(--red) 70%, transparent);
    opacity: 0.15;
  }

  .logo-zone {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo-mark {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-bottom: 2px;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 3px;
    color: var(--chalk);
    line-height: 1;
  }

  .logo-text .accent { color: var(--red); }

  .logo-slash {
    width: 3px;
    height: 24px;
    background: var(--red);
    margin: 0 0 0 3px;
    transform: skewX(-12deg);
    flex-shrink: 0;
  }

  .logo-tag {
    font-size: 9px;
    color: var(--ash);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  nav { flex: 1; padding: 16px 0; overflow-y: auto; }

  .nav-section {
    padding: 0 20px 6px;
    font-size: 8.5px;
    color: var(--ash);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-top: 16px;
  }

  .nav-section:first-child { margin-top: 0; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    color: var(--ash);
    font-size: 11px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    transition: color 0.15s, background 0.15s;
    border-left: 2px solid transparent;
    font-family: 'DM Mono', monospace;
    position: relative;
    user-select: none;
  }

  .nav-item:hover { color: var(--chalk-80); background: var(--chalk-05); }

  .nav-item.active {
    color: var(--chalk);
    border-left: 2px solid var(--red);
    background: var(--red-dim);
  }

  .nav-item.active .nav-icon-wrap { color: var(--red); }

  .nav-item.disabled { opacity: 0.28; cursor: default; pointer-events: none; }

  .nav-icon-wrap {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: color 0.15s;
  }

  .nav-badge {
    margin-left: auto;
    background: var(--red);
    color: white;
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 2px;
    font-weight: 500;
  }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--red-mid);
    border: 1px solid rgba(232,0,45,0.3);
    color: var(--red);
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 4px 8px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .brand-dot {
    width: 5px; height: 5px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .ops-info { margin-top: 8px; }
  .ops-label { font-size: 9px; color: var(--ash); letter-spacing: 1px; }
  .ops-name { font-size: 11px; color: var(--chalk); margin-top: 2px; letter-spacing: 0.5px; }
  .ops-contact {
    display: inline-block;
    margin-top: 6px;
    font-size: 9px;
    color: var(--blue);
    letter-spacing: 0.5px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* ─── MAIN ─────────────────────────────────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    background: var(--void);
  }

  /* ─── TOPBAR ─────────────────────────────────────────────────────────────── */
  .topbar {
    height: 54px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    background: var(--carbon);
    flex-shrink: 0;
    gap: 16px;
  }

  .topbar-left { display: flex; align-items: center; gap: 16px; }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--chalk);
  }

  .breadcrumb {
    font-size: 10px;
    color: var(--ash);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 1px;
  }

  .breadcrumb span { color: var(--chalk-40); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-left: auto;
  }

  .live-indicator {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 9.5px;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: live-pulse 1.8s infinite;
  }

  @keyframes live-pulse {
    0% { box-shadow: 0 0 0 0 rgba(0,209,102,0.5); }
    70% { box-shadow: 0 0 0 5px rgba(0,209,102,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,209,102,0); }
  }

  .topbar-clock {
    font-size: 11px;
    color: var(--chalk-40);
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
  }

  .topbar-divider {
    width: 1px;
    height: 20px;
    background: var(--border2);
  }

  .integration-tag {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 9px;
    color: var(--ash);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 9px;
    border: 1px solid var(--border2);
    border-radius: 2px;
  }

  .integration-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; }

  /* ─── PAGE CONTENT ────────────────────────────────────────────────────────── */
  #page-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 22px 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scrollbar-width: thin;
    scrollbar-color: var(--ash2) transparent;
  }

  #page-content::-webkit-scrollbar { width: 4px; }
  #page-content::-webkit-scrollbar-thumb { background: var(--ash2); border-radius: 2px; }

  /* ─── KPI STRIP ───────────────────────────────────────────────────────────── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .kpi-card {
    background: var(--carbon);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card:hover { border-color: var(--border3); }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 1px;
    background: linear-gradient(90deg, var(--red), transparent);
    opacity: 0.6;
  }

  .kpi-card.green-accent::before { background: linear-gradient(90deg, var(--green), transparent); }
  .kpi-card.amber-accent::before { background: linear-gradient(90deg, var(--amber), transparent); }
  .kpi-card.blue-accent::before { background: linear-gradient(90deg, var(--blue), transparent); }

  .kpi-label {
    font-size: 9px;
    color: var(--ash);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .kpi-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    line-height: 1;
    color: var(--chalk);
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }

  .kpi-number .unit {
    font-size: 20px;
    color: var(--ash);
    letter-spacing: 2px;
  }

  .kpi-number.flash-red { animation: kpi-flash-red 0.5s ease; }
  .kpi-number.flash-green { animation: kpi-flash-green 0.5s ease; }

  @keyframes kpi-flash-red {
    0% { color: var(--red); }
    100% { color: var(--chalk); }
  }

  @keyframes kpi-flash-green {
    0% { color: var(--green); }
    100% { color: var(--chalk); }
  }

  .kpi-sub {
    font-size: 9px;
    color: var(--ash);
    margin-top: 6px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .kpi-delta {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
  }

  .kpi-delta.up { color: var(--green); background: var(--green-dim); }
  .kpi-delta.down { color: var(--red); background: var(--red-dim); }
  .kpi-delta.warn { color: var(--amber); background: var(--amber-dim); }

  /* ─── FILTER & SEARCH ─────────────────────────────────────────────────────── */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--carbon);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 5px;
  }

  .pill-btn {
    padding: 5px 12px;
    border-radius: 2px;
    border: none;
    background: transparent;
    color: var(--ash);
    font-size: 9.5px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .pill-btn:hover { background: var(--chalk-05); color: var(--chalk-80); }

  .pill-btn.active {
    background: var(--red);
    color: #fff;
  }

  .pill-btn.s-processing.active { background: var(--blue); }
  .pill-btn.s-dispatched.active { background: var(--amber); color: #000; }
  .pill-btn.s-out.active { background: var(--red); }
  .pill-btn.s-delivered.active { background: var(--green); color: #000; }
  .pill-btn.s-delayed.active { background: var(--ash2); color: var(--chalk); }

  .count-tag {
    font-size: 8px;
    background: var(--chalk-10);
    color: var(--chalk-40);
    padding: 1px 5px;
    border-radius: 2px;
    margin-left: 2px;
  }

  .controls-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--carbon);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 12px;
    transition: border-color 0.15s;
  }

  .search-box:focus-within { border-color: var(--border3); }

  .search-box svg { color: var(--ash); flex-shrink: 0; }

  .search-box input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--chalk);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    width: 180px;
    letter-spacing: 0.5px;
  }

  .search-box input::placeholder { color: var(--ash); }

  .sort-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 10px;
    background: var(--carbon);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--ash);
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.12s;
  }

  .sort-btn:hover { border-color: var(--border3); color: var(--chalk); }

  /* ─── TABLE ───────────────────────────────────────────────────────────────── */
  .table-container {
    background: var(--carbon);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .table-header-row {
    display: grid;
    grid-template-columns: 110px 140px 85px 1fr 140px 80px 85px 85px 60px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--carbon2);
    gap: 4px;
  }

  .th {
    font-size: 8.5px;
    color: var(--ash);
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    user-select: none;
    transition: color 0.12s;
  }

  .th:hover { color: var(--chalk-80); }

  .table-body { flex: 1; overflow-y: auto; }
  .table-body::-webkit-scrollbar { width: 3px; }
  .table-body::-webkit-scrollbar-thumb { background: var(--ash2); }

  .order-row {
    display: grid;
    grid-template-columns: 110px 140px 85px 1fr 140px 80px 85px 85px 60px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    align-items: center;
    gap: 4px;
    position: relative;
    border-left: 3px solid transparent;
  }

  .order-row:last-child { border-bottom: none; }

  .order-row:hover { background: var(--chalk-05); }

  .order-row.sla-risk {
    background: rgba(245,158,11,0.03);
    border-left: 3px solid rgba(245,158,11,0.4);
  }

  .order-row.sla-fail {
    background: rgba(232,0,45,0.03);
    border-left: 3px solid rgba(232,0,45,0.3);
  }

  .order-row.row-updated {
    animation: row-flash 0.7s ease forwards;
  }

  @keyframes row-flash {
    0% { background: rgba(232,0,45,0.1); border-left-color: var(--red); }
    100% { background: transparent; border-left-color: transparent; }
  }

  .cell {
    font-size: 11px;
    color: var(--chalk);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 8px;
  }

  .cell.dim { color: var(--chalk-40); }
  .cell.mono { font-variant-numeric: tabular-nums; }

  .order-id-cell {
    font-size: 10px;
    color: var(--red);
    letter-spacing: 0.8px;
    font-weight: 500;
  }

  .city-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--chalk-80);
  }

  /* STATUS BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px 3px 6px;
    border-radius: 2px;
    font-size: 9px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

  .badge.processing { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(59,139,235,0.2); }
  .badge.processing .badge-dot { background: var(--blue); }
  .badge.dispatched { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
  .badge.dispatched .badge-dot { background: var(--amber); animation: pulse-dot 1.5s infinite; }
  .badge.out { background: rgba(232,0,45,0.1); color: #FF4D6A; border: 1px solid rgba(232,0,45,0.2); }
  .badge.out .badge-dot { background: #FF4D6A; animation: pulse-dot 1s infinite; }
  .badge.delivered { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,209,102,0.2); }
  .badge.delivered .badge-dot { background: var(--green); }
  .badge.delayed { background: rgba(90,90,90,0.15); color: #888; border: 1px solid rgba(90,90,90,0.2); }
  .badge.delayed .badge-dot { background: #888; }

  /* SLA TAGS */
  .sla-tag { font-size: 10px; font-variant-numeric: tabular-nums; display: flex; align-items: center; gap: 4px; }
  .sla-tag.ok { color: var(--green); }
  .sla-tag.risk { color: var(--amber); }
  .sla-tag.fail { color: var(--red); }

  .sla-bar {
    width: 36px;
    height: 3px;
    background: var(--carbon3);
    border-radius: 2px;
    overflow: hidden;
  }

  .sla-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  .sla-fill.ok { background: var(--green); }
  .sla-fill.risk { background: var(--amber); }
  .sla-fill.fail { background: var(--red); }

  .action-btn {
    width: 26px; height: 26px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ash);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    margin-left: auto;
  }

  .action-btn:hover { border-color: var(--border3); color: var(--chalk); background: var(--chalk-05); }

  .table-empty {
    padding: 64px 28px;
    text-align: center;
    color: var(--ash);
    font-size: 11px;
    letter-spacing: 1px;
  }

  .table-empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.3; }

  /* ─── DETAIL PANEL ──────────────────────────────────────────────────────────── */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  #overlay.open { opacity: 1; pointer-events: all; }

  #detail-panel {
    position: fixed;
    top: 0; right: 0;
    width: 440px;
    height: 100vh;
    background: var(--carbon);
    border-left: 1px solid var(--border2);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }

  #detail-panel.open { transform: translateX(0); }

  .panel-topbar {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--carbon2);
  }

  .panel-oid {
    font-size: 9px;
    color: var(--red);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .panel-customer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1.5px;
    color: var(--chalk);
    line-height: 1.1;
  }

  .panel-sku {
    font-size: 10px;
    color: var(--ash);
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  .close-btn {
    width: 30px; height: 30px;
    border-radius: 2px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--chalk-40);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
    flex-shrink: 0;
  }

  .close-btn:hover { border-color: var(--chalk-20); color: var(--chalk); }

  .panel-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--ash2) transparent;
  }

  .panel-content::-webkit-scrollbar { width: 3px; }
  .panel-content::-webkit-scrollbar-thumb { background: var(--ash2); }

  .panel-section { margin-bottom: 22px; }

  .panel-section-title {
    font-size: 8.5px;
    color: var(--ash);

  const active = orders.filter(o => o.status !== 'delivered').length;
  const ofd    = orders.filter(o => o.status === 'out').length;
  const delivered = orders.filter(o => o.status === 'delivered').length;
  return { active, ofd, delivered, slaRate, avgTime };
}

function renderRow(o) {
  const risk = o.sla === 'risk' ? ' sla-risk' : o.sla === 'fail' ? ' sla-fail' : '';
  const flash = flashId === o.id ? ' row-updated' : '';
  const fcShort = o.fc.replace(' FC','').split(' ').slice(0,2).join(' ');
  return `
  <div class="order-row${risk}${flash}" id="row-${o.id}" onclick="openPanel('${o.id}')">
    <div class="cell order-id-cell">${o.id}</div>
    <div class="cell">${o.customer}</div>
    <div class="cell"><div class="city-tag">${cityDot(o.city)}${o.city}</div></div>
    <div class="cell dim">${o.sku}</div>
    <div class="cell">${statusBadge(o.status)}</div>
    <div class="cell mono" style="${o.sla==='risk'?'color:var(--amber)':o.sla==='fail'?'color:var(--red)':''}">${o.eta}</div>
    <div class="cell">${slaTag(o.sla)}</div>
    <div class="cell dim" style="font-size:9.5px">${fcShort}</div>
    <div class="cell" style="display:flex;justify-content:flex-end">
      <button class="action-btn" onclick="event.stopPropagation();openPanel('${o.id}')">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <path d="M1 5.5h9M6.5 2l3.5 3.5L6.5 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>`;
}

function getFiltered() {
  return orders.filter(o => {
    const matchF = activeFilter === 'all' || o.status === activeFilter;
    const q = searchTerm.toLowerCase();
    const matchS = !q || o.id.toLowerCase().includes(q) || o.customer.toLowerCase().includes(q) || o.city.toLowerCase().includes(q) || o.sku.toLowerCase().includes(q);
    return matchF && matchS;
  });
}

function setFilter(f) { activeFilter = f; render(); }
function setSearch(v) { searchTerm = v; render(); }

════════════════════════════════════════════ */
function openPanel(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;

  document.getElementById('p-oid').textContent = o.id;
  document.getElementById('p-customer').textContent = o.customer;
  document.getElementById('p-sku').textContent = o.sku + ' · ' + o.city;

  const steps = [
    { name:'Order Placed',        time: o.placed,                             statusReq: null },
    { name:'Picked & Packed',     time: o.status!=='processing' ? o.placed+' → '+o.dispatched : '—', statusReq:'dispatched' },
    { name:'Dispatched from FC',  time: o.status!=='processing' ? o.dispatched : '—',                statusReq:'dispatched' },
    { name:'Out for Delivery',    time: o.status==='out'||o.status==='delivered' ? 'En route · '+o.fc : '—', statusReq:'out' },
    { name:'Delivered',           time: o.status==='delivered' ? 'Completed ✓' : `Est. ${o.eta}`,   statusReq:'delivered' },
  ];

  const curIdx = getStatusIndex(o.status);

  function stepClass(i) {
    if (i === 0) return 'done';
    const req = steps[i].statusReq;
    const ri = STEP_ORDER.indexOf(req);
    if (ri < curIdx) return 'done';
    if (ri === curIdx && o.status !== 'delayed') return 'current';
    return 'pending';
  }

  const slaGauge = () => {
    const [pct, cls, label] = o.sla === 'ok' ? ['100', 'ok', 'On Track'] : o.sla === 'risk' ? ['52', 'risk', 'At Risk'] : ['18', 'fail', 'SLA Missed'];
    return `<div class="sla-gauge-wrap">
      <div style="font-size:9px;color:var(--ash);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap">SLA Status</div>
      <div class="gauge-track"><div class="gauge-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="gauge-label ${o.sla==='ok'?'':'sla-tag '+(o.sla)}" style="color:${o.sla==='ok'?'var(--green)':o.sla==='risk'?'var(--amber)':'var(--red)'}">${label}</div>
    </div>`;
  };

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Delivery Progress <span style="color:var(--chalk-40);font-size:8px">${o.status.toUpperCase()}</span></div>
      <div class="stepper">
        ${steps.map((s, i) => {
          const sc = stepClass(i);
          const isLast = i === steps.length - 1;
          return `<div class="step">
            <div class="step-track">
              <div class="step-node ${sc}"></div>
              ${!isLast ? `<div class="step-connector ${sc==='done'?'done':''}"></div>` : ''}
            </div>
            <div class="step-body">
              <div class="step-name ${sc==='pending'?'pending':''}">${s.name}</div>
              <div class="step-time ${sc==='current'?'active':''}">${s.time}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="panel-section">
      ${slaGauge()}
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Order Details</div>
      <div class="panel-meta-grid">
        <div class="meta-item"><div class="meta-label">Fulfillment Center</div><div class="meta-value">${o.fc}</div></div>
        <div class="meta-item"><div class="meta-label">Rider Assigned</div><div class="meta-value ${o.rider==='Pending'?'amber':''}">${o.rider}</div></div>
        <div class="meta-item"><div class="meta-label">Dispatched</div><div class="meta-value">${o.dispatched}</div></div>
        <div class="meta-item"><div class="meta-label">ETA</div><div class="meta-value ${o.sla==='risk'?'amber':o.sla==='fail'?'highlight':''}">${o.eta}</div></div>
        <div class="meta-item"><div class="meta-label">Placed At</div><div class="meta-value">${o.placed}</div></div>
        <div class="meta-item"><div class="meta-label">Customer Phone</div><div class="meta-value" style="color:var(--blue)">+91 ${o.phone}</div></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Status History</div>
      <div style="background:var(--carbon2);border:1px solid var(--border);border-radius:3px;overflow:hidden">
        ${[
          { time: o.placed,                                        event: 'Order placed via Shopify',         col: 'var(--chalk-40)' },
          { time: o.status!=='processing' ? o.dispatched : '—',  event: 'Packed at ' + o.fc,                 col: 'var(--blue)' },
          { time: o.status!=='processing' ? o.dispatched : '—',  event: 'Dispatched · Rider assigned',        col: 'var(--amber)' },
          o.status==='out'||o.status==='delivered' ? { time: o.dispatched, event:'Out for delivery',          col: 'var(--red)' }     : null,
          o.status==='delivered' ? { time:'Completed', event:'Successfully delivered',                         col: 'var(--green)' }   : null,
          o.status==='delayed'   ? { time: o.dispatched, event:'⚠ Delivery delayed · Ops notified',           col: 'var(--amber)' }   : null,
        ].filter(Boolean).map((e, i, arr) => `
          <div style="display:flex;gap:12px;padding:9px 14px;${i<arr.length-1?'border-bottom:1px solid var(--border)':''}">
            <div style="font-size:10px;color:var(--ash);min-width:44px;flex-shrink:0;font-variant-numeric:tabular-nums">${e.time}</div>
            <div style="font-size:11px;color:${e.col}">${e.event}</div>
          </div>`).join('')}
      </div>
    </div>`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
}

// KPI drift every 4s
setInterval(() => {
  if (currentPage !== 'tracking') return;
  slaRate = Math.min(99.5, Math.max(88, slaRate + (Math.random() - 0.52) * 0.25));
  avgTime = Math.min(4.8,  Math.max(2.0, avgTime + (Math.random() - 0.5) * 0.06));
  const slaEl = document.getElementById('kpi-sla');
  const avgEl = document.getElementById('kpi-avg');
  if (slaEl) { slaEl.innerHTML = slaRate.toFixed(1) + '<span class="unit">%</span>'; slaEl.classList.remove('flash-green'); void slaEl.offsetWidth; slaEl.classList.add('flash-green'); }
  if (avgEl) { avgEl.innerHTML = avgTime.toFixed(1) + '<span class="unit">hr</span>'; avgEl.classList.remove('flash-red'); void avgEl.offsetWidth; avgEl.classList.add('flash-red'); }
}, 4000);

// Order status advancement every 9s
setInterval(() => {
  if (currentPage !== 'tracking') return;
  const eligible = orders.filter(o => o.status !== 'delivered' && o.status !== 'delayed');
  if (!eligible.length) return;
  const o = eligible[Math.floor(Math.random() * eligible.length)];
  const next = NEXT_STATUS[o.status];
  if (!next) return;
  o.status = next;
  if (next === 'dispatched') o.dispatched = new Date().toTimeString().slice(0,5);
  if (next === 'delivered')  { o.eta = '—'; o.sla = 'ok'; }
  flashId = o.id;
  render();
  setTimeout(() => { flashId = null; }, 800);
}, 9000);

    <div class="rev-card">
      <div class="rev-card-header">
        <div class="rev-card-title">Monthly Revenue</div>
        <div class="period-tabs">
          ${['7D','1M','3M','1Y'].map(t=>`<button class="period-tab${revTab===t?' active':''}" onclick="setRevTab('${t}')">${t}</button>`).join('')}
        </div>
      </div>
      <div class="bar-chart-area">
        <div class="bc-grid">
          <div class="bc-gridline" style="bottom:75%"><span class="bc-gridlabel">₹80L</span></div>
          <div class="bc-gridline" style="bottom:50%"><span class="bc-gridlabel">₹60L</span></div>
          <div class="bc-gridline" style="bottom:25%"><span class="bc-gridlabel">₹40L</span></div>
        </div>
        ${[
          {m:'Aug',h:52},{m:'Sep',h:58},{m:'Oct',h:61},{m:'Nov',h:55},
          {m:'Dec',h:70},{m:'Jan',h:63},{m:'Feb',h:71},{m:'Mar',h:88,cur:true}
        ].map((b,i)=>`
          <div class="bc-col">
            <div class="bc-bar${b.cur?' cur':''}" style="height:${b.h}%;animation-delay:${i*0.05}s">
              <span class="bc-label">${b.m}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <div class="rev-card">
      <div class="rev-card-header">
        <div class="rev-card-title">Revenue Mix</div>
        <div class="rev-card-badge">Mar 2026</div>
      </div>
      <div class="donut-wrap">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle cx="65" cy="65" r="48" fill="none" stroke="#E8002D" stroke-width="17" stroke-dasharray="156.4 301.6" stroke-dashoffset="75.4"/>
          <circle cx="65" cy="65" r="48" fill="none" stroke="#8C001B" stroke-width="17" stroke-dasharray="84.2 374" stroke-dashoffset="-81"/>
          <circle cx="65" cy="65" r="48" fill="none" stroke="#2A2A2A" stroke-width="17" stroke-dasharray="36.2 421.8" stroke-dashoffset="-165.2"/>
          <circle cx="65" cy="65" r="48" fill="none" stroke="#1C1C1C" stroke-width="17" stroke-dasharray="24.1 434" stroke-dashoffset="-201.4"/>
          <text x="65" y="60" text-anchor="middle" font-family="'Bebas Neue',sans-serif" font-size="19" fill="#F2EEE8">₹84.2L</text>
          <text x="65" y="75" text-anchor="middle" font-family="'DM Mono',monospace" font-size="8" fill="#5A5A5A" letter-spacing="2">TOTAL</text>
        </svg>
        <div class="donut-legend">
          <div class="legend-row"><div class="legend-left"><div class="legend-dot" style="background:var(--red)"></div>Fulfillment</div><div class="legend-val">52%</div></div>
          <div class="legend-row"><div class="legend-left"><div class="legend-dot" style="background:#8C001B"></div>Shipping</div><div class="legend-val">28%</div></div>
          <div class="legend-row"><div class="legend-left"><div class="legend-dot" style="background:#3A3A3A"></div>Returns</div><div class="legend-val">12%</div></div>
          <div class="legend-row"><div class="legend-left"><div class="legend-dot" style="background:#2A2A2A;border:1px solid #444"></div>Storage</div><div class="legend-val">8%</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="rev-bottom-row">
    <div class="rev-card">
      <div class="rev-card-header">
        <div class="rev-card-title">Revenue by City</div>
        <div class="rev-card-badge">Top 5</div>
      </div>
      <table class="city-tbl">
        <thead><tr><th>City</th><th>Revenue</th><th>Share</th></tr></thead>
        <tbody>
          ${[
            {code:'MUM',city:'Mumbai',    rev:'₹28.4L',pct:100,  col:'var(--red)',   bg:'var(--red-dim)'},
            {code:'DEL',city:'Delhi',     rev:'₹22.1L',pct:78,   col:'#FF6B5B',     bg:'rgba(255,107,91,0.1)'},
            {code:'BLR',city:'Bengaluru', rev:'₹16.8L',pct:59,   col:'var(--green)', bg:'var(--green-dim)'},
            {code:'HYD',city:'Hyderabad', rev:'₹9.3L', pct:33,   col:'var(--amber)', bg:'var(--amber-dim)'},
            {code:'CHE',city:'Chennai',   rev:'₹7.6L', pct:27,   col:'var(--ash)',   bg:'var(--chalk-05)'},
          ].map(r=>`<tr>
            <td><span class="city-code" style="background:${r.bg};color:${r.col}">${r.code}</span></td>
            <td>${r.rev}</td>
            <td><div style="font-size:10px;color:var(--ash)">${r.pct===100?'33.7':r.pct===78?'26.2':r.pct===59?'19.9':r.pct===33?'11.0':'9.0'}%</div><div class="bar-inline" style="width:${r.pct}%;background:${r.col}"></div></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="rev-card">
      <div class="rev-card-header"><div class="rev-card-title">Key Metrics</div></div>
      <div class="metric-list">
        ${[
          {name:'Cost per Shipment', val:'₹42.80', pts:'0,28 12,22 24,20 36,18 48,14 60,10 72,8',   col:'var(--red)'},
          {name:'EBITDA',            val:'₹14.6L', pts:'0,24 12,22 24,18 36,20 48,14 60,12 72,8',   col:'var(--green)'},
          {name:'Returns Cost',      val:'₹3.2L',  pts:'0,8 12,12 24,10 36,14 48,16 60,13 72,18',   col:'var(--amber)'},
          {name:'Cash Collected',    val:'₹79.1L', pts:'0,26 12,22 24,20 36,16 48,14 60,10 72,6',   col:'var(--blue)'},
        ].map(m=>`
          <div class="metric-item">
            <div>
              <div class="metric-name">${m.name}</div>
              <div class="metric-val">${m.val}</div>
            </div>
            <svg width="72" height="32" viewBox="0 0 72 32">
              <polyline points="${m.pts}" fill="none" stroke="${m.col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function setRevTab(t) {
  revTab = t;
  if (currentPage === 'revenue') render();
}

/* ════════════════════════════════════════════
   BOOT
════════════════════════════════════════════ */
render();
</script>
</body>
</html>
